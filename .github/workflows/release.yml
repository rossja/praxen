name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify the tag matches PRAXA_SPEC.md version
        run: |
          spec_version="$(grep -m1 -E '^\*\*Version:\*\*' PRAXA_SPEC.md | sed -E 's/.*\*\*Version:\*\*[[:space:]]*//; s/[[:space:]]*$//')"
          tag_version="${GITHUB_REF_NAME#v}"
          echo "PRAXA_SPEC.md version: $spec_version ; tag: $tag_version"
          if [ "$spec_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match PRAXA_SPEC.md version $spec_version"
            exit 1
          fi
      - name: Run the test suite
        run: python3 tests/render/test_render.py
      - name: Build the distributable zip
        run: bash build.sh
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/praxa-${version}.zip" \
            --title "Praxa $GITHUB_REF_NAME" \
            --generate-notes
