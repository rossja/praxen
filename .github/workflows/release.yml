name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify the tag matches PRAXEN_SPEC.md version
        run: |
          spec_version="$(grep -m1 -E '^\*\*Version:\*\*' PRAXEN_SPEC.md | sed -E 's/.*\*\*Version:\*\*[[:space:]]*//; s/[[:space:]]*$//')"
          tag_version="${GITHUB_REF_NAME#v}"
          echo "PRAXEN_SPEC.md version: $spec_version ; tag: $tag_version"
          if [ "$spec_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match PRAXEN_SPEC.md version $spec_version"
            exit 1
          fi
      - name: Run the test suite
        run: python3 tests/render/test_render.py
      - name: Install build-only docs dependency
        # Lets build.sh rebuild guide/ and enforce the docs freshness backstop.
        # Build-only; never shipped in the plugin (which stays stdlib-only).
        run: pip install -r requirements-dev.txt
      - name: Build the distributable zip
        run: bash build.sh
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/praxen-${version}.zip" \
            --title "Praxen $GITHUB_REF_NAME" \
            --generate-notes
      # Coverage reports (owasp-coverage-report.html, raise-coverage-report.html)
      # are regenerated as part of release prep on dev and reach main through the
      # normal dev→main promotion PR — not auto-committed from this job.
      # To regenerate manually: python3 tests/baselines/owasp_coverage.py
      #                         python3 tests/baselines/raise_coverage.py
